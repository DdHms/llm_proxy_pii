<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Call Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .agent-node { transition: all 0.3s ease; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div x-data="agentMonitor()" class="container mx-auto p-8">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Agent Orchestration Monitor
                </h1>
                <p class="text-slate-400 mt-2">Real-time visualization of agent delegation and tool execution.</p>
            </div>
            <div class="flex items-center space-x-4">
                <span :class="connected ? 'bg-emerald-500' : 'bg-red-500'" class="w-3 h-3 rounded-full"></span>
                <span x-text="connected ? 'Connected' : 'Disconnected'" class="text-sm font-medium uppercase tracking-wider"></span>
            </div>
        </header>

        <!-- Main Graph Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Agent Hierarchy -->
            <div class="lg:col-span-2 bg-slate-800/50 rounded-2xl border border-slate-700 p-6 min-h-[500px] relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 pointer-events-none" 
                     style="background-image: radial-gradient(#475569 1px, transparent 1px); background-size: 30px 30px;">
                </div>
                
                <div class="relative z-10 flex flex-col items-center space-y-12">
                    <!-- Orchestrator Node -->
                    <div class="agent-node bg-blue-600 p-6 rounded-xl shadow-lg shadow-blue-500/20 border-2 border-blue-400 w-64 text-center">
                        <h3 class="font-bold text-lg">Main Agent</h3>
                        <p class="text-blue-100 text-xs opacity-70">Strategic Orchestrator</p>
                    </div>

                    <!-- Connectors & Subagents -->
                    <div class="flex flex-wrap justify-center gap-8 w-full">
                        <template x-for="agent in subagents" :key="agent.id">
                            <div class="flex flex-col items-center">
                                <div class="h-12 w-px bg-slate-600 mb-4"></div>
                                <div :class="agent.status === 'working' ? 'border-emerald-400 shadow-emerald-500/20 pulse' : 'border-slate-600'" 
                                     class="agent-node bg-slate-700 p-4 rounded-lg border-2 w-48 text-center">
                                    <h4 x-text="agent.name" class="font-semibold capitalize"></h4>
                                    <p x-text="agent.task" class="text-[10px] text-slate-400 mt-1 truncate px-2"></p>
                                    <div class="mt-3 flex justify-center space-x-1">
                                        <template x-for="i in 3">
                                            <div :class="agent.status === 'working' ? 'bg-emerald-400' : 'bg-slate-500'" class="w-1.5 h-1.5 rounded-full"></div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Right: Activity Feed -->
            <div class="bg-slate-800 rounded-2xl border border-slate-700 flex flex-col h-[600px]">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="font-bold">Live Activity</h2>
                    <button @click="logs = []" class="text-xs text-slate-500 hover:text-slate-300">Clear</button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                    <template x-for="log in logs" :key="log.id">
                        <div class="text-sm border-l-2 pl-3 py-1" :class="getLogClass(log.type)">
                            <div class="flex justify-between text-[10px] opacity-50 mb-1">
                                <span x-text="log.time"></span>
                                <span x-text="log.source" class="uppercase"></span>
                            </div>
                            <p x-text="log.message" class="text-slate-200 leading-tight"></p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
        function agentMonitor() {
            return {
                connected: false,
                subagents: [],
                logs: [],
                
                init() {
                    this.connectWebSocket();
                    this.addLog('System', 'Monitor initialized. Awaiting agent calls...', 'system');
                },

                connectWebSocket() {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const ws = new WebSocket(`${protocol}//${window.location.host}/ws/agent`);
                    
                    ws.onopen = () => {
                        this.connected = true;
                        this.addLog('System', 'Connected to Agent Orchestrator.', 'system');
                    };
                    
                    ws.onclose = () => {
                        this.connected = false;
                        this.addLog('System', 'Disconnected. Retrying...', 'error');
                        setTimeout(() => this.connectWebSocket(), 3000);
                    };
                    
                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        this.addLog(data.source, data.message, data.type);
                        
                        if (data.agent_id) {
                            let agent = this.subagents.find(a => a.id === data.agent_id);
                            if (!agent) {
                                agent = { id: data.agent_id, name: data.source, task: data.task, status: 'working' };
                                this.subagents.push(agent);
                            } else {
                                agent.task = data.task || agent.task;
                                agent.status = data.status || agent.status;
                            }
                        }
                    };
                },

                addLog(source, message, type = 'info') {
                    this.logs.unshift({
                        id: Date.now(),
                        time: new Date().toLocaleTimeString(),
                        source,
                        message,
                        type
                    });
                },

                getLogClass(type) {
                    return {
                        'system': 'border-blue-500 bg-blue-500/5',
                        'call': 'border-emerald-500 bg-emerald-500/5',
                        'tool': 'border-purple-500 bg-purple-500/5',
                        'error': 'border-red-500 bg-red-500/5'
                    }[type] || 'border-slate-500';
                },

                simulateCall() {
                    const id = Date.now();
                    this.subagents.push({
                        id,
                        name: 'Generalist',
                        task: 'Calculating 5 * 2...',
                        status: 'working'
                    });
                    this.addLog('Main Agent', 'Delegating calculation to Generalist...', 'call');
                    
                    setTimeout(() => {
                        const agent = this.subagents.find(a => a.id === id);
                        if (agent) {
                            agent.status = 'completed';
                            agent.task = 'Result: 10';
                            this.addLog('Generalist', 'Calculation complete: 10', 'tool');
                        }
                    }, 3000);
                }
            }
        }
    </script>
</body>
</html>
